---
- name: 02 - Install RKE2 Agent
  hosts: rke2_agent
  become: true
  vars:
    master_ip: 10.0.0.21
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - gnupg
          - ca-certificates
        state: present
        update_cache: yes

    - name: Download and install RKE2 agent
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=agent sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Read node token from local file
      set_fact:
        node_token: "{{ lookup('file', './rke2_token') }}"

    - name: Create RKE2 agent config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          server: https://{{ master_ip }}:9345
          token: "{{ node_token }}"
        mode: '0600'

    - name: Enable and start RKE2 agent service
      systemd:
        name: rke2-agent
        enabled: yes
        state: started
