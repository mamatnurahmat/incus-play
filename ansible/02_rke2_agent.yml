---
# ──────────────────────────────────────────────────
# 02 - Install RKE2 Agent (Worker Node)
# ──────────────────────────────────────────────────
# Playbook ini menginstall RKE2 agent (worker) dan join ke cluster.
# Membutuhkan file rke2_token yang sudah digenerate oleh playbook master.
# Pastikan master node sudah running sebelum menjalankan playbook ini.
#
# Inventory: rke2_inventory.ini (group: rke2_agent)
# Prasyarat: Jalankan 01_rke2_master.yml atau 01_rke2_master_ha.yml terlebih dahulu
#
# Cara apply:
#   ansible-playbook -i rke2_inventory.ini 02_rke2_agent.yml
# ──────────────────────────────────────────────────

- name: 02 - Install RKE2 Agent
  hosts: rke2_agent
  become: true
  vars:
    master_ip: 10.0.0.21
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - gnupg
          - ca-certificates
        state: present
        update_cache: yes

    - name: Wait for master node port 9345 to be reachable
      wait_for:
        host: "{{ master_ip }}"
        port: 9345
        timeout: 60

    - name: Download and install RKE2 agent (v1.35.1+rke2r1)
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION=v1.35.1+rke2r1 INSTALL_RKE2_TYPE=agent sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Read node token from local file
      set_fact:
        node_token: "{{ lookup('file', playbook_dir + '/rke2_token') }}"

    - name: Create RKE2 agent config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          server: https://{{ master_ip }}:9345
          token: "{{ node_token }}"
        mode: '0600'

    - name: Enable and start RKE2 agent service
      systemd:
        name: rke2-agent
        enabled: yes
        state: started
