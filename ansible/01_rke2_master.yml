---
- name: 01 - Install RKE2 Master
  hosts: rke2_master
  become: true
  tasks:
    - name: Ensure iptables and prerequisites are installed
      apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - iptables
        state: present
        update_cache: yes

    - name: Download and install RKE2 server
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=server sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Create RKE2 config to disable default ingress
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          disable:
            - rke2-ingress-nginx
        mode: '0600'

    - name: Enable RKE2 server service
      systemd:
        name: rke2-server
        enabled: yes

    - name: Start RKE2 server service
      systemd:
        name: rke2-server
        state: started
      register: rke2_start
      ignore_errors: yes

    - name: Debug RKE2 failure if service failed to start
      block:
        - name: Get rke2-server journal logs
          command: journalctl -u rke2-server --no-pager -n 50
          register: rke2_logs
        - name: Show rke2-server logs
          debug:
            var: rke2_logs.stdout_lines
        - name: Fail the playbook
          fail:
            msg: "rke2-server failed to start. Check the logs above."
      when: rke2_start is failed

    - name: Wait for Kubernetes API to be available
      wait_for:
        port: 6443
        timeout: 180

    - name: Wait for node token to be generated
      wait_for:
        path: /var/lib/rancher/rke2/server/node-token
        timeout: 120

    - name: Retrieve node token
      slurp:
        src: /var/lib/rancher/rke2/server/node-token
      register: node_token_raw

    - name: Save node token to local file for agent use
      copy:
        content: "{{ node_token_raw.content | b64decode | trim }}"
        dest: "{{ playbook_dir }}/rke2_token"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Setup kubectl for ubuntu user
      block:
        - name: Create .kube directory
          file:
            path: /home/ubuntu/.kube
            state: directory
            owner: ubuntu
            mode: '0700'
        - name: Copy kubeconfig to user home
          copy:
            src: /etc/rancher/rke2/rke2.yaml
            dest: /home/ubuntu/.kube/config
            remote_src: yes
            owner: ubuntu
            mode: '0600'
        - name: Add kubectl to PATH
          lineinfile:
            path: /home/ubuntu/.bashrc
            line: 'export PATH=$PATH:/var/lib/rancher/rke2/bin'
            state: present
