---
# ──────────────────────────────────────────────────
# Deploy HAProxy Load Balancer pada DMZ
# ──────────────────────────────────────────────────
# Playbook ini mendeploy HAProxy sebagai load balancer di node DMZ (10.0.0.10)
# menggunakan Docker Compose. HAProxy akan mem-proxy traffic ke:
#   - K8s API (6443)       → 3 master nodes
#   - RKE2 Supervisor (9345) → 3 master nodes
#   - Rancher UI (8443)    → rancher node (10.0.0.30)
#   - ArgoCD UI (30443)    → 3 master nodes
#   - Echo-Server (443)    → 3 master nodes (domain: echo.local, HTTPS)
#   - Stats Dashboard (8404)
#
# Inventory: inventory.ini (group: dmz)
# Prasyarat:
#   - Docker sudah terinstall di node DMZ (install-docker.yml)
#   - SSL certificate sudah digenerate (generate-ssl.yml)
#
# Cara apply:
#   ansible-playbook -i inventory.ini DMZ_generate-ssl.yml
#   ansible-playbook -i inventory.ini DMZ_deploy-haproxy-k8s.yml
# ──────────────────────────────────────────────────

- name: Deploy HAProxy on DMZ
  hosts: dmz
  become: true
  tasks:
    - name: Create haproxy directory
      file:
        path: /home/ubuntu/haproxy
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy HAProxy configuration
      copy:
        dest: /home/ubuntu/haproxy/haproxy.cfg
        owner: ubuntu
        group: ubuntu
        mode: '0644'
        content: |
          global
              log stdout format raw local0
              maxconn 4096

          defaults
              log     global
              mode    tcp
              option  tcplog
              timeout connect 10s
              timeout client  30s
              timeout server  30s
              retries 3

          # ──────────────────────────────────────
          # Stats Dashboard
          # ──────────────────────────────────────
          frontend stats
              mode http
              bind *:8404
              stats enable
              stats uri /stats
              stats refresh 10s
              stats admin if TRUE

          # ──────────────────────────────────────
          # RKE2 Kubernetes API (6443)
          # ──────────────────────────────────────
          frontend k8s_api
              bind *:6443
              default_backend k8s_api_backend

          backend k8s_api_backend
              balance roundrobin
              server rke2-master01 10.0.0.21:6443 check
              server rke2-master02 10.0.0.23:6443 check
              server rke2-master03 10.0.0.24:6443 check

          # ──────────────────────────────────────
          # RKE2 Supervisor API (9345)
          # ──────────────────────────────────────
          frontend rke2_supervisor
              bind *:9345
              default_backend rke2_supervisor_backend

          backend rke2_supervisor_backend
              balance roundrobin
              server rke2-master01 10.0.0.21:9345 check
              server rke2-master02 10.0.0.23:9345 check
              server rke2-master03 10.0.0.24:9345 check

          # ──────────────────────────────────────
          # HTTP (80) - Redirect echo.local ke HTTPS
          # ──────────────────────────────────────
          frontend http_in
              mode http
              bind *:80
              option httplog

              # Redirect echo.local ke HTTPS
              acl host_echo hdr(host) -i echo.local
              http-request redirect scheme https if host_echo

              default_backend http_default_backend

          backend http_default_backend
              mode http
              balance roundrobin
              server rke2-master01 10.0.0.21:80 check
              server rke2-master02 10.0.0.23:80 check
              server rke2-master03 10.0.0.24:80 check

          # ──────────────────────────────────────
          # HTTPS (443) - SSL Termination
          # ──────────────────────────────────────
          frontend https_in
              mode http
              bind *:443 ssl crt /usr/local/etc/haproxy/certs/echo.local.pem
              option httplog

              # Route based on Host header (SNI)
              acl host_echo hdr(host) -i echo.local

              use_backend echo_server_backend if host_echo
              default_backend https_default_backend

          backend https_default_backend
              mode http
              balance roundrobin
              server rke2-master01 10.0.0.21:443 check ssl verify none
              server rke2-master02 10.0.0.23:443 check ssl verify none
              server rke2-master03 10.0.0.24:443 check ssl verify none

          # ──────────────────────────────────────
          # Echo-Server (echo.local → NodePort 30326)
          # ──────────────────────────────────────
          backend echo_server_backend
              mode http
              balance roundrobin
              option httpchk GET /
              server rke2-master01 10.0.0.21:30326 check
              server rke2-master02 10.0.0.23:30326 check
              server rke2-master03 10.0.0.24:30326 check

          # ──────────────────────────────────────
          # Rancher UI (8443 -> 443)
          # ──────────────────────────────────────
          frontend rancher_ui
              bind *:8443
              default_backend rancher_backend

          backend rancher_backend
              balance roundrobin
              server rancher 10.0.0.30:443 check

          # ──────────────────────────────────────
          # ArgoCD UI (30443)
          # ──────────────────────────────────────
          frontend argocd_ui
              bind *:30443
              default_backend argocd_backend

          backend argocd_backend
              balance roundrobin
              server rke2-master01 10.0.0.21:30443 check
              server rke2-master02 10.0.0.23:30443 check
              server rke2-master03 10.0.0.24:30443 check

    - name: Copy docker-compose.yml for HAProxy
      copy:
        dest: /home/ubuntu/haproxy/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'
        content: |
          version: '2'

          services:
            haproxy:
              image: haproxy:lts
              container_name: haproxy
              restart: always
              ports:
                - "80:80"
                - "443:443"
                - "6443:6443"
                - "8404:8404"
                - "8443:8443"
                - "9345:9345"
                - "30443:30443"
              volumes:
                - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
                - ./certs:/usr/local/etc/haproxy/certs:ro

    - name: Stop existing HAProxy container
      shell: docker compose down
      args:
        chdir: /home/ubuntu/haproxy
      ignore_errors: yes

    - name: Start HAProxy with docker compose
      shell: docker compose up -d --force-recreate
      args:
        chdir: /home/ubuntu/haproxy

    - name: Show HAProxy access info
      debug:
        msg:
          - "HAProxy deployed on DMZ (10.0.0.10)"
          - "─────────────────────────────────────"
          - "Stats Dashboard : http://10.0.0.10:8404/stats"
          - "K8s API         : https://10.0.0.10:6443"
          - "HTTP            : http://10.0.0.10:80"
          - "HTTPS           : https://10.0.0.10:443"
          - "Rancher UI      : https://10.0.0.10:8443"
          - "ArgoCD UI       : https://10.0.0.10:30443"
          - "Echo-Server     : https://echo.local (SSL termination di HAProxy)"
          - "─────────────────────────────────────"
          - "Untuk akses echo.local, tambahkan ke /etc/hosts:"
          - "  10.0.0.10 echo.local"
          - ""
          - "Test: curl -k https://echo.local"
