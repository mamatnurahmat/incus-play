---
# ──────────────────────────────────────────────────
# Install Docker dan Docker Compose
# ──────────────────────────────────────────────────
# Playbook ini menginstall Docker Engine, containerd, dan Docker Compose
# plugin pada semua VM di group incus_vms. Juga menambahkan user ubuntu
# ke group docker agar bisa menjalankan docker tanpa sudo.
#
# Inventory: inventory.ini (group: incus_vms)
#
# Cara apply:
#   ansible-playbook -i inventory.ini install-docker.yml
#
# Untuk install hanya pada host tertentu (misal hanya rancher):
#   ansible-playbook -i inventory.ini install-docker.yml --limit rancher
# ──────────────────────────────────────────────────

- name: Install Docker and Docker Compose
  hosts: incus_vms
  become: yes
  tasks:
    - name: Update apt package index
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create directory for Docker GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine, containerd, and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
