---
# ──────────────────────────────────────────────────
# 03 - Deploy ArgoCD via RKE2 HelmChart Manifest
# ──────────────────────────────────────────────────
# Playbook ini mendeploy ArgoCD menggunakan HelmChart manifest pada RKE2.
# Akan membuat namespace argocd dan deploy chart argo-cd versi 7.7.16.
# ArgoCD UI bisa diakses via NodePort 30443.
#
# Inventory: rke2_inventory.ini (group: rke2_master)
# Prasyarat: RKE2 master sudah running (01_rke2_master.yml / 01_rke2_master_ha.yml)
#
# Cara apply:
#   ansible-playbook -i rke2_inventory.ini 03_rke2_manifest_argocd.yml
#
# Akses ArgoCD setelah deploy:
#   URL     : https://<MASTER_IP>:30443
#   Username: admin
#   Password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
# ──────────────────────────────────────────────────

- name: 03 - Deploy ArgoCD via RKE2 HelmChart Manifest
  hosts: rke2_master
  become: true
  tasks:
    - name: Ensure RKE2 manifests directory exists
      file:
        path: /var/lib/rancher/rke2/server/manifests
        state: directory
        mode: '0755'

    - name: Create argocd namespace manifest
      copy:
        dest: /var/lib/rancher/rke2/server/manifests/argocd-namespace.yaml
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: argocd
        mode: '0600'

    - name: Deploy ArgoCD HelmChart manifest
      copy:
        dest: /var/lib/rancher/rke2/server/manifests/argocd.yaml
        content: |
          apiVersion: helm.cattle.io/v1
          kind: HelmChart
          metadata:
            name: argocd
            namespace: kube-system
          spec:
            repo: https://argoproj.github.io/argo-helm
            chart: argo-cd
            version: "7.7.16"
            targetNamespace: argocd
            createNamespace: true
            valuesContent: |-
              server:
                service:
                  type: NodePort
                  nodePortHttps: 30443
        mode: '0600'

    - name: Wait for ArgoCD server pod to be created
      shell: >
        /var/lib/rancher/rke2/bin/kubectl
        --kubeconfig /etc/rancher/rke2/rke2.yaml
        get pods -n argocd -l app.kubernetes.io/name=argocd-server
        --no-headers 2>/dev/null | head -1
      register: argocd_pod
      retries: 30
      delay: 10
      until: argocd_pod.stdout | length > 0

    - name: Show ArgoCD access info
      debug:
        msg:
          - "ArgoCD deployed via HelmChart manifest."
          - "Access UI: https://10.0.0.21:30443"
          - "Get initial admin password with:"
          - "  kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"


# Akses ArgoCD
# URL: https://10.0.0.21:30443
# Username: admin

# ssh ubuntu@10.0.0.21
# kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
